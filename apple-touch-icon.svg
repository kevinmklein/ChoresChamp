<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <linearGradient id="bg" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="180" y2="180">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="gold" gradientUnits="userSpaceOnUse" x1="90" y1="44" x2="90" y2="126">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="180" height="180" fill="url(#bg)"/>

  <!-- Soft glow behind trophy -->
  <ellipse cx="90" cy="86" rx="52" ry="46" fill="rgba(255,255,255,0.07)"/>

  <!-- Corner sparkle dots -->
  <circle cx="30" cy="28" r="5"   fill="rgba(255,255,255,0.35)"/>
  <circle cx="152" cy="26" r="3.5" fill="rgba(255,255,255,0.28)"/>
  <circle cx="156" cy="152" r="6"  fill="rgba(255,255,255,0.20)"/>
  <circle cx="24"  cy="155" r="4"  fill="rgba(255,255,255,0.28)"/>
  <circle cx="166" cy="76" r="2.5" fill="rgba(255,255,255,0.22)"/>
  <circle cx="14"  cy="108" r="3"  fill="rgba(255,255,255,0.18)"/>

  <!-- Left handle -->
  <path d="M 54 60 C 26 56 26 90 54 88"
        fill="none" stroke="#FFD700" stroke-width="9" stroke-linecap="round"/>

  <!-- Right handle -->
  <path d="M 126 60 C 154 56 154 90 126 88"
        fill="none" stroke="#FFD700" stroke-width="9" stroke-linecap="round"/>

  <!-- Trophy cup body -->
  <path d="M 52 44 L 128 44 C 130 72 106 98 90 100 C 74 98 50 72 52 44 Z"
        fill="url(#gold)"/>

  <!-- Cup top shadow line -->
  <rect x="52" y="44" width="76" height="5" rx="2" fill="rgba(0,0,0,0.08)"/>

  <!-- Cup shine highlight -->
  <ellipse cx="73" cy="65" rx="8" ry="17"
           fill="rgba(255,255,255,0.22)" transform="rotate(-15 73 65)"/>

  <!-- 5-pointed star inside cup -->
  <path d="M 90 55 L 93 65 L 104 65 L 96 72 L 99 82 L 90 76 L 81 82 L 84 72 L 76 65 L 87 65 Z"
        fill="rgba(255,255,255,0.72)"/>

  <!-- Stem -->
  <rect x="83" y="100" width="14" height="12" fill="#FFC200"/>

  <!-- Base -->
  <rect x="62" y="112" width="56" height="14" rx="6" fill="url(#gold)"/>

  <!-- Base shine line -->
  <rect x="66" y="114" width="48" height="4" rx="2" fill="rgba(255,255,255,0.22)"/>
</svg>
